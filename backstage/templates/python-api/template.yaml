apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: python-api
  title: Python FastAPI
  description: Create a Python FastAPI service with Docker, CI, health checks, metrics, and GitOps manifests.
  tags:
    - python
    - fastapi
    - api
spec:
  owner: platform
  type: service

  parameters:
    - title: Service details
      required:
        - appName
        - port
        - registry
      properties:
        appName:
          title: App Name
          type: string
          description: Unique service name (lowercase, dash-separated)
        port:
          title: Port
          type: number
          default: 8000
        registry:
          title: Image Registry
          type: string
          default: ghcr.io/emmexgdc
        monitoring:
          title: Enable Monitoring
          type: boolean
          default: true
          description: Generate ServiceMonitor for Prometheus
        secrets:
          title: Enable Secrets
          type: boolean
          default: false
          description: Generate ExternalSecret resource (requires Vault path)
        ingress:
          title: Enable Ingress
          type: boolean
          default: false
          description: Expose service via Nginx ingress with TLS
      dependencies:
        ingress:
          oneOf:
            - properties:
                ingress:
                  const: false
            - properties:
                ingress:
                  const: true
                host:
                  title: Hostname
                  type: string
                  description: e.g. my-app.homelab.emmexgdc.uk
              required:
                - host

  steps:
    - id: fetch-app
      name: Generate app source files
      action: fetch:template
      input:
        url: ./skeleton
        values:
          appName: ${{ parameters.appName }}
          port: ${{ parameters.port }}
          registry: ${{ parameters.registry }}

    - id: publish-app
      name: Publish app repo to GitHub
      action: publish:github
      input:
        description: ${{ parameters.appName }} Python API
        repoUrl: github.com?owner=emmexgdc&repo=${{ parameters.appName }}
        defaultBranch: main
        repoVisibility: public

    - id: fetch-gitops
      name: Generate GitOps manifests
      action: fetch:template
      input:
        url: ./gitops-skeleton
        targetPath: ./gitops-output
        values:
          appName: ${{ parameters.appName }}
          port: ${{ parameters.port }}
          image: ${{ parameters.registry }}/${{ parameters.appName }}
          host: ${{ parameters.host }}
          monitoring: ${{ parameters.monitoring }}
          secrets: ${{ parameters.secrets }}
          ingress: ${{ parameters.ingress }}

    - id: publish-gitops-pr
      name: Open PR to homelab-gitops
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=emmexgdc&repo=homelab-gitops
        branchName: add-${{ parameters.appName }}
        title: "Add ${{ parameters.appName }} via Backstage"
        description: |
          Auto-generated by Backstage scaffolder.

          Adds:
          - apps/${{ parameters.appName }}/ manifests
        sourcePath: ./gitops-output
        targetPath: apps/${{ parameters.appName }}

    - id: log
      name: Done
      action: debug:log
      input:
        message: "Generated ${{ parameters.appName }}, source repo created, GitOps PR opened."

  output:
    links:
      - title: App Repository
        url: ${{ steps['publish-app'].output.remoteUrl }}
      - title: GitOps PR
        url: ${{ steps['publish-gitops-pr'].output.remoteUrl }}
    text:
      - title: Next step
        content: |
          Review and merge the GitOps PR. After merge, add the app to the ApplicationSet
          to trigger ArgoCD deployment across dev/staging/prod.