apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${{ values.appName }}
  labels:
    app: ${{ values.appName }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ${{ values.appName }}-secret
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: apps/${{ values.appName }}
