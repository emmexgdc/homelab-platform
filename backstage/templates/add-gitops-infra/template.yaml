apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: add-gitops-infra
  title: Add GitOps Infra to Existing Repo
  description: Generate Kubernetes manifests and ArgoCD wiring for an app that already has a repo.
  tags:
    - gitops
    - infra
    - retrofit
spec:
  owner: platform
  type: infrastructure

  parameters:
    - title: Service details
      required:
        - appName
        - sourceRepo
        - port
        - registry
      properties:
        appName:
          title: App Name
          type: string
          description: Used for namespace, manifest folder, and image tag (lowercase, dash-separated)
        sourceRepo:
          title: Source Repository
          type: string
          description: Full GitHub URL of the existing app repo (e.g. https://github.com/emmexgdc/my-app)
        port:
          title: Container Port
          type: number
          default: 8080
          description: Port the app listens on
        registry:
          title: Image Registry
          type: string
          default: ghcr.io/emmexgdc
          description: Where the image is pushed (image will be <registry>/<appName>)
        monitoring:
          title: Enable Monitoring
          type: boolean
          default: true
          description: Generate ServiceMonitor for Prometheus
        secrets:
          title: Enable Secrets
          type: boolean
          default: false
          description: Generate ExternalSecret resource (requires Vault path)
        ingress:
          title: Enable Ingress
          type: boolean
          default: false
          description: Expose service via Nginx ingress with TLS
      dependencies:
        ingress:
          oneOf:
            - properties:
                ingress:
                  const: false
            - properties:
                ingress:
                  const: true
                host:
                  title: Hostname
                  type: string
                  description: e.g. my-app.homelab.emmexgdc.uk
              required:
                - host

  steps:
    - id: fetch-gitops
      name: Generate GitOps manifests
      action: fetch:template
      input:
        url: ./gitops-skeleton
        targetPath: ./gitops-output
        values:
          appName: ${{ parameters.appName }}
          port: ${{ parameters.port }}
          image: ${{ parameters.registry }}/${{ parameters.appName }}
          host: ${{ parameters.host }}
          monitoring: ${{ parameters.monitoring }}
          secrets: ${{ parameters.secrets }}
          ingress: ${{ parameters.ingress }}

    - id: publish-gitops-pr
      name: Open PR to homelab-gitops
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=emmexgdc&repo=homelab-gitops
        branchName: add-${{ parameters.appName }}
        title: "Add ${{ parameters.appName }} infra via Backstage"
        description: |
          Auto-generated by Backstage scaffolder (add-gitops-infra template).

          Source repo: ${{ parameters.sourceRepo }}

          Adds:
          - apps/${{ parameters.appName }}/ manifests
        sourcePath: ./gitops-output
        targetPath: apps/${{ parameters.appName }}

    - id: log
      name: Done
      action: debug:log
      input:
        message: "Generated GitOps infra for ${{ parameters.appName }}. Source: ${{ parameters.sourceRepo }}"

  output:
    links:
      - title: Source Repository
        url: ${{ parameters.sourceRepo }}
      - title: GitOps PR
        url: ${{ steps['publish-gitops-pr'].output.remoteUrl }}
    text:
      - title: Next step
        content: |
          Review and merge the GitOps PR. After merge, ArgoCD will deploy the app
          across dev/staging/prod. Make sure the source repo builds and pushes images
          to the registry path you specified.