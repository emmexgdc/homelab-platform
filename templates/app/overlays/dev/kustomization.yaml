apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: __APP_NAME__-dev

resources:
- ../../base
- configmap.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: __APP_NAME__

images:
- name: __APP_NAME__
  newName: __IMAGE__
  newTag: latest

labels:
- pairs:
    environment: dev
