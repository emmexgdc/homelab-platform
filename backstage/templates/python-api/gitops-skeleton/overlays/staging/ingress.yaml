apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ values.appName }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - ${{ values.host }}
    secretName: ${{ values.appName }}-tls
  rules:
  - host: ${{ values.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ${{ values.appName }}
            port:
              number: ${{ values.port }}
