name: CI-CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/emmexgdc/__APP_NAME__

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build -t $IMAGE_NAME:${{ steps.vars.outputs.tag }} .

      - name: Push image
        run: |
          docker push $IMAGE_NAME:${{ steps.vars.outputs.tag }}

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: emmexgdc/homelab-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update GitOps manifests
        run: |
          TAG=${{ steps.vars.outputs.tag }}

          cd gitops

          sed -i "s/newTag: .*/newTag: ${TAG}/" apps/__APP_NAME__/overlays/dev/kustomization.yaml
          sed -i "s/newTag: .*/newTag: ${TAG}/" apps/__APP_NAME__/overlays/staging/kustomization.yaml
          sed -i "s/newTag: .*/newTag: ${TAG}/" apps/__APP_NAME__/overlays/prod/kustomization.yaml

      - name: Commit and push GitOps changes
        run: |
          cd gitops

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "deploy __APP_NAME__ ${GITHUB_SHA::7}" || echo "No changes"

          git push
