apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: typescript-node-api
  title: TypeScript Node API
  description: Create a TypeScript Node.js API with Docker, CI, health checks, metrics, and GitOps manifests.
  tags:
    - nodejs
    - typescript
    - api
spec:
  owner: platform
  type: service
  parameters:
    - title: Service details
      required:
        - appName
        - port
        - registry
      properties:
        appName:
          title: App Name
          type: string
          description: Unique service name
        port:
          title: Port
          type: number
          default: 8080
        registry:
          title: Image Registry
          type: string
          default: ghcr.io/emmexgdc
        ingress:
          title: Enable Ingress
          type: boolean
          default: true
        host:
          title: Hostname
          type: string
          description: Required if ingress is enabled
        monitoring:
          title: Enable Monitoring
          type: boolean
          default: true
        secrets:
          title: Enable Secrets
          type: boolean
          default: true

  steps:
    - id: fetch-base
      name: Generate service files
      action: fetch:template
      input:
        url: ./skeleton
        values:
          appName: ${{ parameters.appName }}
          port: ${{ parameters.port }}
          registry: ${{ parameters.registry }}
          ingress: ${{ parameters.ingress }}
          host: ${{ parameters.host }}
          monitoring: ${{ parameters.monitoring }}
          secrets: ${{ parameters.secrets }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        description: ${{ parameters.appName }}
        repoUrl: github.com?owner=emmexgdc&repo=${{ parameters.appName }}
        defaultBranch: main
        repoVisibility: public

    - id: log
      name: Show selected values
      action: debug:log
      input:
        message: Generated ${{ parameters.appName }} from TypeScript starter template.

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
    text:
      - title: Next step
        content: Repo created. Next we wire GitOps manifest generation.